<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A2UI v0.9 Playground</title>
  <style>
    /* ── 强制覆盖外部注入的 dark 主题 ── */
    html, body, #app {
      background: #f0f2f5 !important;
      color: #1a1a2e !important;
      color-scheme: light !important;
    }
    :root {
      --pri: #1677FF;
      --bg: #f0f2f5;
      --white: #ffffff;
      --border: #e0e3e8;
      --text: #1a1a2e;
      --text2: #5f6368;
      --text3: #9aa0a6;
      --green: #16a34a;
      --red: #cf1322;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      background: #f0f2f5;
      color: #1a1a2e;
      display: flex;
      flex-direction: column;
      height: 100%;
    }

    /* ═══════════ TOOLBAR ═══════════ */
    .toolbar {
      height: 52px;
      background: #fff;
      border-bottom: 1px solid #e0e3e8;
      display: flex;
      align-items: center;
      padding: 0 20px;
      gap: 10px;
      flex-shrink: 0;
      box-shadow: 0 1px 4px rgba(0,0,0,0.06);
      z-index: 10;
    }
    .tbar-title { font-size: 15px; font-weight: 700; color: #1a1a2e; flex: 1; }
    .tbar-title em { color: #1677FF; font-style: normal; }
    .tbar-badge {
      font-size: 11px; padding: 2px 7px; border-radius: 10px;
      background: #e6f4ff; color: #1677FF; font-weight: 600;
    }

    /* ═══════════ BUTTONS ═══════════ */
    .btn {
      display: inline-flex; align-items: center; gap: 5px;
      padding: 6px 16px; border-radius: 6px; cursor: pointer;
      font-size: 13px; font-weight: 500; border: none;
      white-space: nowrap; transition: opacity 0.15s;
      line-height: 1.4;
    }
    .btn:hover { opacity: 0.82; }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; }
    .btn-pri  { background: #1677FF; color: #fff; }
    .btn-def  { background: #fff; color: #1a1a2e; border: 1px solid #e0e3e8; }
    .btn-ok   { background: #16a34a; color: #fff; }
    .btn-ghost{ background: transparent; color: #1677FF; padding: 6px 8px; }

    /* ═══════════ MAIN LAYOUT ═══════════ */
    .main {
      flex: 1;
      display: grid;
      grid-template-columns: 420px 4px 1fr;
      overflow: hidden;
    }

    /* ═══════════ LEFT PANEL ═══════════ */
    .left-panel {
      background: #fff;
      border-right: 1px solid #e0e3e8;
      display: flex; flex-direction: column;
      overflow: hidden;
    }
    .panel-hd {
      padding: 10px 14px;
      border-bottom: 1px solid #e0e3e8;
      background: #fafbfc;
      display: flex; align-items: center; gap: 7px;
      font-size: 12px; font-weight: 600; color: #5f6368;
      flex-shrink: 0;
    }
    .dot { width: 7px; height: 7px; border-radius: 50%; }
    .dot-b { background: #1677FF; }
    .dot-g { background: #16a34a; }

    .editor-wrap { flex: 1; overflow: hidden; position: relative; }
    #json-input {
      width: 100%; height: 100%;
      border: none; outline: none; resize: none;
      font-family: "Menlo","Monaco","Consolas","Courier New",monospace;
      font-size: 12px; line-height: 1.65;
      padding: 14px;
      background: #1e1e2e;
      color: #cdd6f4;
      tab-size: 2;
    }
    #json-input::placeholder { color: #585b70; }

    .editor-ft {
      padding: 7px 14px;
      border-top: 1px solid #e0e3e8;
      background: #fafbfc;
      display: flex; align-items: center; gap: 8px;
      flex-shrink: 0;
    }
    .ed-status { flex: 1; font-size: 12px; }
    .s-idle { color: #9aa0a6; }
    .s-ok   { color: #16a34a; }
    .s-err  { color: #cf1322; }

    /* ═══════════ RESIZE ═══════════ */
    .resizer {
      background: transparent; cursor: col-resize;
      transition: background 0.15s;
    }
    .resizer:hover, .resizer.drag { background: #1677FF; }

    /* ═══════════ RIGHT PANEL ═══════════ */
    .right-panel {
      display: flex; flex-direction: column;
      overflow: hidden;
      background: #f0f2f5;
    }
    .preview-hd {
      padding: 9px 16px;
      border-bottom: 1px solid #e0e3e8;
      background: #fff;
      display: flex; align-items: center; gap: 10px;
      flex-shrink: 0;
    }
    .preview-hd-title {
      flex: 1; font-size: 12px; font-weight: 600; color: #5f6368;
      display: flex; align-items: center; gap: 7px;
    }
    .changed-pill {
      display: none; align-items: center; gap: 4px;
      padding: 2px 8px; border-radius: 4px;
      background: #fffbe6; color: #d97706;
      font-size: 11px; font-weight: 600;
    }
    .changed-pill.show { display: inline-flex; }

    .preview-scroll {
      flex: 1; overflow-y: auto;
      padding: 24px;
    }
    .preview-inner {
      max-width: 740px;
      margin: 0 auto;
    }

    /* Empty state */
    .empty-state {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      height: 100%; gap: 12px;
      color: #9aa0a6;
    }
    .empty-icon { font-size: 44px; opacity: 0.35; }

    /* Render error */
    .render-err {
      background: #fff1f0; border: 1px solid #ffa39e;
      border-radius: 8px; padding: 16px;
      color: #cf1322; font-size: 13px; line-height: 1.7;
    }
    .render-err code {
      display: block; margin-top: 8px;
      background: #fff5f5; padding: 8px 10px;
      border-radius: 4px; font-size: 11.5px;
      word-break: break-all; white-space: pre-wrap;
    }

    /* sample picker */
    .sample-sel {
      padding: 5px 10px; border: 1px solid #e0e3e8;
      border-radius: 6px; font-size: 12px; background: #fff;
      color: #1a1a2e; outline: none; cursor: pointer;
    }

    /* ═══════════ OUTPUT MODAL ═══════════ */
    .modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.5); z-index: 200;
      align-items: center; justify-content: center;
    }
    .modal-bg.open { display: flex; }
    .modal-box {
      background: #fff; border-radius: 12px;
      width: 680px; max-width: 95vw; max-height: 85vh;
      display: flex; flex-direction: column;
      box-shadow: 0 16px 48px rgba(0,0,0,0.22); overflow: hidden;
    }
    .modal-hd {
      padding: 16px 20px 12px; border-bottom: 1px solid #e0e3e8;
      display: flex; align-items: center; gap: 10px;
    }
    .modal-hd h3 { flex: 1; font-size: 15px; font-weight: 700; }
    .modal-body { flex: 1; overflow-y: auto; padding: 14px 20px; }
    .modal-ft {
      padding: 12px 20px; border-top: 1px solid #e0e3e8;
      display: flex; justify-content: flex-end; gap: 8px;
    }
    #out-code {
      width: 100%; height: 320px;
      border: 1px solid #e0e3e8; border-radius: 8px;
      font-family: "Menlo","Monaco","Consolas",monospace;
      font-size: 11.5px; line-height: 1.65; padding: 12px;
      background: #1e1e2e; color: #cdd6f4;
      resize: none; outline: none;
    }
    .copy-tip { font-size: 12px; color: #9aa0a6; margin-top: 7px; }
    .copy-tip.ok { color: #16a34a; }

    /* ═══════════ A2UI COMPONENT STYLES ═══════════ */

    /* Layout */
    .u-row {
      display: flex; flex-direction: row;
      align-items: stretch; gap: 8px;
    }
    .u-col {
      display: flex; flex-direction: column;
      align-items: stretch; gap: 8px;
    }
    .u-row.j-start   { justify-content: flex-start; }
    .u-row.j-center  { justify-content: center; }
    .u-row.j-end     { justify-content: flex-end; }
    .u-row.j-between { justify-content: space-between; }
    .u-row.j-around  { justify-content: space-around; }
    .u-row.j-evenly  { justify-content: space-evenly; }
    .u-row.j-stretch { justify-content: stretch; }
    .u-col.j-start   { justify-content: flex-start; }
    .u-col.j-center  { justify-content: center; }
    .u-col.j-end     { justify-content: flex-end; }
    .u-col.j-between { justify-content: space-between; }

    .u-row.a-start   { align-items: flex-start; }
    .u-row.a-center  { align-items: center; }
    .u-row.a-end     { align-items: flex-end; }
    .u-col.a-start   { align-items: flex-start; }
    .u-col.a-center  { align-items: center; }
    .u-col.a-end     { align-items: flex-end; }

    /* weight / flex-grow */
    .w-1 { flex: 1; }
    .w-2 { flex: 2; }
    .w-3 { flex: 3; }

    /* Text */
    .u-text { color: #1a1a2e; line-height: 1.55; }
    .u-text.v-h1      { font-size: 22px; font-weight: 700; }
    .u-text.v-h2      { font-size: 18px; font-weight: 700; }
    .u-text.v-h3      { font-size: 16px; font-weight: 600; }
    .u-text.v-h4      { font-size: 14px; font-weight: 600; }
    .u-text.v-h5      { font-size: 13px; font-weight: 600; }
    .u-text.v-body    { font-size: 14px; color: #5f6368; }
    .u-text.v-caption { font-size: 12px; color: #9aa0a6; }

    /* Image */
    .u-img { object-fit: cover; display: block; }
    .u-img.v-icon         { width: 24px;  height: 24px;  border-radius: 4px; }
    .u-img.v-avatar       { width: 36px;  height: 36px;  border-radius: 50%; }
    .u-img.v-smallFeature { width: 72px;  height: 72px;  border-radius: 8px; flex-shrink:0; }
    .u-img.v-mediumFeature{ width: 120px; height: 120px; border-radius: 8px; flex-shrink:0; }
    .u-img.v-largeFeature { width: 100%;  height: 200px; border-radius: 8px; }
    .u-img.v-header       { width: 100%;  height: 220px; border-radius: 10px; }

    /* Icon */
    .u-icon {
      display: inline-flex; align-items: center; justify-content: center;
      width: 20px; height: 20px; flex-shrink: 0; color: #5f6368;
    }
    .u-icon svg { width: 20px; height: 20px; fill: currentColor; }

    /* Divider */
    .u-divider-h { border: none; border-top: 1px solid #e0e3e8; margin: 2px 0; }
    .u-divider-v { border: none; border-left: 1px solid #e0e3e8; margin: 0 2px; align-self: stretch; }

    /* Card */
    .u-card {
      background: #fff;
      border-radius: 10px;
      box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04);
      padding: 16px;
      overflow: hidden;
    }

    /* Button */
    .u-btn {
      display: inline-flex; align-items: center; justify-content: center;
      gap: 5px; padding: 7px 16px; border-radius: 6px;
      font-size: 14px; font-weight: 500; border: none; cursor: pointer;
      white-space: nowrap; transition: opacity 0.15s;
    }
    .u-btn:hover { opacity: 0.82; }
    .u-btn.v-primary    { background: #1677FF; color: #fff; }
    .u-btn.v-default    { background: #fff; color: #1a1a2e; border: 1px solid #e0e3e8; }
    .u-btn.v-borderless { background: transparent; color: #1677FF; padding: 7px 6px; }

    /* TextField */
    .u-textfield { display: flex; flex-direction: column; gap: 4px; }
    .u-textfield label { font-size: 12px; color: #5f6368; font-weight: 500; }
    .u-textfield input,
    .u-textfield textarea {
      width: 100%; padding: 8px 11px;
      border: 1px solid #e0e3e8; border-radius: 6px;
      font-size: 14px; font-family: inherit;
      background: #fafbfc; outline: none;
      transition: border-color 0.15s;
      color: #1a1a2e;
    }
    .u-textfield input:focus,
    .u-textfield textarea:focus { border-color: #1677FF; background: #fff; }
    .u-textfield textarea { resize: vertical; min-height: 80px; }

    /* CheckBox */
    .u-checkbox { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .u-checkbox input { width: 16px; height: 16px; accent-color: #1677FF; cursor: pointer; }
    .u-checkbox span { font-size: 14px; color: #1a1a2e; }

    /* ChoicePicker */
    .u-choice { display: flex; flex-direction: column; gap: 6px; }
    .u-choice-label { font-size: 12px; color: #5f6368; font-weight: 500; }
    .u-choice-chips { display: flex; flex-wrap: wrap; gap: 6px; }
    .u-chip {
      padding: 5px 14px; border-radius: 20px;
      border: 1px solid #e0e3e8; font-size: 13px;
      background: #fff; color: #5f6368; cursor: pointer;
      transition: all 0.15s; user-select: none;
    }
    .u-chip.sel, .u-chip:hover { border-color: #1677FF; color: #1677FF; background: #e6f4ff; }
    .u-choice-radios { display: flex; flex-direction: column; gap: 6px; }
    .u-choice-item { display: flex; align-items: center; gap: 8px; cursor: pointer; }
    .u-choice-item input { width: 16px; height: 16px; accent-color: #1677FF; cursor: pointer; }
    .u-choice-checks { display: flex; flex-direction: column; gap: 6px; }

    /* Slider */
    .u-slider { display: flex; flex-direction: column; gap: 5px; }
    .u-slider label { font-size: 12px; color: #5f6368; font-weight: 500; }
    .u-slider input[type=range] { width: 100%; accent-color: #1677FF; }

    /* DateTimeInput */
    .u-datetime { display: flex; flex-direction: column; gap: 4px; }
    .u-datetime label { font-size: 12px; color: #5f6368; font-weight: 500; }
    .u-datetime input {
      padding: 8px 11px; border: 1px solid #e0e3e8;
      border-radius: 6px; font-size: 14px; font-family: inherit;
      background: #fafbfc; outline: none; color: #1a1a2e;
      transition: border-color 0.15s;
    }
    .u-datetime input:focus { border-color: #1677FF; background: #fff; }

    /* Tabs */
    .u-tabs { background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08), 0 0 0 1px rgba(0,0,0,0.04); }
    .u-tabs-hd { display: flex; border-bottom: 1px solid #e0e3e8; background: #fafbfc; overflow-x: auto; }
    .u-tab-btn {
      padding: 11px 20px; border: none; background: none; cursor: pointer;
      font-size: 14px; font-weight: 500; color: #5f6368;
      border-bottom: 2px solid transparent; margin-bottom: -1px;
      white-space: nowrap; transition: color 0.15s, border-color 0.15s;
    }
    .u-tab-btn.act { color: #1677FF; border-bottom-color: #1677FF; }
    .u-tab-panel { display: none; padding: 16px; }
    .u-tab-panel.act { display: block; }

    /* List */
    .u-list { display: flex; flex-direction: column; gap: 8px; }
    .u-list.horiz { flex-direction: row; overflow-x: auto; }

    /* Modal */
    .u-modal-bg {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.45); z-index: 300;
      align-items: center; justify-content: center;
    }
    .u-modal-bg.open { display: flex; }
    .u-modal-box {
      background: #fff; border-radius: 12px;
      min-width: 320px; max-width: 480px; width: 90%;
      padding: 24px 20px 18px;
      box-shadow: 0 10px 36px rgba(0,0,0,0.2);
    }

    /* Video */
    .u-video { width: 100%; border-radius: 8px; background: #000; display: block; }

    /* AudioPlayer */
    .u-audio { width: 100%; }
    .u-audio-wrap { display: flex; flex-direction: column; gap: 4px; }
    .u-audio-desc { font-size: 12px; color: #9aa0a6; }
  </style>
</head>
<body>

<!-- ═══════════ TOOLBAR ═══════════ -->
<div class="toolbar">
  <div class="tbar-title">A2UI <em>Playground</em></div>
  <span class="tbar-badge">v0.9</span>
  <select class="sample-sel" id="sample-sel" onchange="loadSample(this.value)">
    <option value="">— 加载示例 —</option>
    <option value="form">预订表单</option>
    <option value="list">数据列表</option>
    <option value="detail">详情页</option>
    <option value="dashboard">仪表盘</option>
  </select>
  <button class="btn btn-def" onclick="fmtJson()" title="Ctrl+Shift+F">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M3 10h11v2H3zm0-4h18v2H3zm0 8h7v2H3zm13 .58V22l5-3-5-3v2.58z"/></svg>
    格式化
  </button>
  <button class="btn btn-pri" onclick="doRender()" title="Ctrl+Enter">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M8 5v14l11-7z"/></svg>
    渲染
  </button>
</div>

<!-- ═══════════ MAIN ═══════════ -->
<div class="main" id="layout">

  <!-- LEFT: JSON Editor -->
  <div class="left-panel">
    <div class="panel-hd">
      <span class="dot dot-b"></span>
      输入 A2UI JSON
      <span style="margin-left:auto;font-size:11px;font-weight:400;color:#9aa0a6" id="lc"></span>
    </div>
    <div class="editor-wrap">
      <textarea id="json-input" spellcheck="false"
        placeholder='粘贴 A2UI v0.9 三段式 JSON，例如：
[
  { "createSurface": { "surfaceId": "my-ui", "catalogId": "..." } },
  { "updateComponents": { "surfaceId": "my-ui", "components": [
    { "id": "root", "component": "Column", "children": ["title"] },
    { "id": "title", "component": "Text", "text": "Hello!", "variant": "h1" }
  ]}},
  { "updateDataModel": { "surfaceId": "my-ui", "contents": {} } }
]'></textarea>
    </div>
    <div class="editor-ft">
      <span class="ed-status s-idle" id="ed-st">— 请输入 JSON 后点击渲染</span>
      <button class="btn btn-ghost" onclick="clearAll()" style="font-size:12px;padding:3px 7px">清空</button>
    </div>
  </div>

  <!-- RESIZER -->
  <div class="resizer" id="resizer"></div>

  <!-- RIGHT: Preview -->
  <div class="right-panel">
    <div class="preview-hd">
      <div class="preview-hd-title">
        <span class="dot dot-g"></span>
        渲染预览
        <span class="changed-pill" id="chg-pill">● 已修改</span>
      </div>
      <button class="btn btn-ok" id="out-btn" onclick="openOut()" disabled>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
        确定 · 输出 JSON
      </button>
    </div>
    <div class="preview-scroll">
      <div class="preview-inner">
        <div class="empty-state" id="empty">
          <div class="empty-icon">🎨</div>
          <div>粘贴 A2UI v0.9 JSON，点击「渲染」预览界面</div>
          <div style="font-size:12px;color:#9aa0a6">支持三段式消息数组 + 平铺组件列表</div>
        </div>
        <div id="preview" style="display:none"></div>
      </div>
    </div>
  </div>

</div>

<!-- ═══════════ OUTPUT MODAL ═══════════ -->
<div class="modal-bg" id="out-modal">
  <div class="modal-box">
    <div class="modal-hd">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="#16a34a"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41z"/></svg>
      <h3>输出 JSON</h3>
      <button class="btn btn-ghost" onclick="closeOut()" style="padding:3px;font-size:17px;line-height:1">✕</button>
    </div>
    <div class="modal-body">
      <p style="font-size:13px;color:#5f6368;margin-bottom:10px">当前界面状态对应的 A2UI v0.9 JSON（含用户填写的数据）：</p>
      <textarea id="out-code" readonly></textarea>
      <p class="copy-tip" id="copy-tip">点击「复制」可将 JSON 复制到剪贴板</p>
    </div>
    <div class="modal-ft">
      <button class="btn btn-def" onclick="closeOut()">关闭</button>
      <button class="btn btn-pri" onclick="copyOut()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        复制
      </button>
      <button class="btn btn-ok" onclick="dlOut()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="white"><path d="M19 9h-4V3H9v6H5l7 7 7-7zm-8 2V5h2v6h1.17L12 13.17 9.83 11H11zm-6 7h14v2H5z"/></svg>
        下载 .json
      </button>
    </div>
  </div>
</div>

<!-- ═══════════ JS (下一步注入) ═══════════ -->
<script>
/* ═══════════════════════════════════════════════════
   A2UI v0.9 渲染引擎
   支持：三段式消息数组、平铺组件、数据绑定、List模板
   ═══════════════════════════════════════════════════ */

// ── 状态 ──
let _surface = null;   // { surfaceId, catalogId }
let _compMap = {};     // id → component对象
let _dataModel = {};   // contents
let _rawMessages = []; // 原始三段式数组（用于输出）

function iconSvg(name) {
  const svg = ICONS[name] || ICONS['info'];
  return `<span class="u-icon">${svg}</span>`;
}

// ── JSON Pointer 解析（RFC 6901）──
function resolvePointer(data, pointer) {
  if (!pointer || pointer === '/') return data;
  const parts = pointer.replace(/^\//, '').split('/').map(p => p.replace(/~1/g,'/').replace(/~0/g,'~'));
  let cur = data;
  for (const p of parts) {
    if (cur == null) return undefined;
    cur = cur[p];
  }
  return cur;
}

// ── 解析数据绑定值 ──
// binding: 静态值 or { path: "/..." } or { path: "relative" }(模板中)
function resolveValue(binding, templateData) {
  if (binding == null) return '';
  if (typeof binding !== 'object') return String(binding);
  if (binding.path !== undefined) {
    const p = String(binding.path);
    if (p.startsWith('/')) {
      const v = resolvePointer(_dataModel, p);
      return v != null ? v : '';
    } else {
      // 相对路径（模板内）
      if (templateData != null && typeof templateData === 'object') {
        const v = templateData[p];
        return v != null ? v : '';
      }
      return '';
    }
  }
  return '';
}

// ── 渲染单个组件 ──
function renderComp(id, templateData) {
  const comp = _compMap[id];
  if (!comp) return `<span style="color:#cf1322;font-size:12px">[未找到组件: ${escH(id)}]</span>`;
  const c = comp.component;

  switch (c) {
    case 'Column': return renderColumn(comp, templateData);
    case 'Row':    return renderRow(comp, templateData);
    case 'List':   return renderList(comp, templateData);
    case 'Text':   return renderText(comp, templateData);
    case 'Image':  return renderImage(comp, templateData);
    case 'Icon':   return renderIcon(comp, templateData);
    case 'Divider':return renderDivider(comp);
    case 'Video':  return renderVideo(comp, templateData);
    case 'AudioPlayer': return renderAudio(comp, templateData);
    case 'Card':   return renderCard(comp, templateData);
    case 'Tabs':   return renderTabs(comp, templateData);
    case 'Modal':  return renderModal(comp, templateData);
    case 'Button': return renderButton(comp, templateData);
    case 'TextField':    return renderTextField(comp, templateData);
    case 'CheckBox':     return renderCheckBox(comp, templateData);
    case 'ChoicePicker': return renderChoicePicker(comp, templateData);
    case 'Slider':       return renderSlider(comp, templateData);
    case 'DateTimeInput':return renderDateTimeInput(comp, templateData);
    default:
      return `<div style="padding:8px;border:1px dashed #e0e3e8;border-radius:6px;font-size:12px;color:#9aa0a6">[${escH(c)}]</div>`;
  }
}

// ── Children 渲染 ──
function renderChildren(children, templateData) {
  if (!children) return '';
  if (Array.isArray(children)) {
    return children.map(id => renderComp(String(id), templateData)).join('');
  }
  // template: { componentId, path }
  if (children.componentId && children.path) {
    const arr = resolvePointer(_dataModel, children.path);
    if (!Array.isArray(arr)) return '';
    return arr.map(item => renderComp(children.componentId, item)).join('');
  }
  return '';
}

function justifyClass(v) {
  const map = { start:'j-start', center:'j-center', end:'j-end', spaceBetween:'j-between', spaceAround:'j-around', spaceEvenly:'j-evenly', stretch:'j-stretch' };
  return map[v] || '';
}
function alignClass(v) {
  const map = { start:'a-start', center:'a-center', end:'a-end', stretch:'' };
  return map[v] || '';
}
function weightClass(comp) {
  if (comp.weight) return ` w-${comp.weight}`;
  return '';
}

// ── Layout ──
function renderColumn(comp, td) {
  const jc = justifyClass(comp.justify), ac = alignClass(comp.align);
  return `<div class="u-col ${jc} ${ac}${weightClass(comp)}">${renderChildren(comp.children, td)}</div>`;
}
function renderRow(comp, td) {
  const jc = justifyClass(comp.justify), ac = alignClass(comp.align);
  return `<div class="u-row ${jc} ${ac}${weightClass(comp)}">${renderChildren(comp.children, td)}</div>`;
}
function renderList(comp, td) {
  const horiz = comp.direction === 'horizontal' ? ' horiz' : '';
  return `<div class="u-list${horiz}${weightClass(comp)}">${renderChildren(comp.children, td)}</div>`;
}

// ── Display ──
function renderText(comp, td) {
  const v = comp.text != null ? resolveValue(comp.text, td) : '';
  const variant = comp.variant || 'body';
  return `<span class="u-text v-${escA(variant)}${weightClass(comp)}">${escH(String(v))}</span>`;
}
function renderImage(comp, td) {
  const url = resolveValue(comp.url, td);
  const variant = comp.variant || 'mediumFeature';
  const fit = comp.fit || 'cover';
  return `<img class="u-img v-${escA(variant)}${weightClass(comp)}" src="${escA(String(url))}" alt="" style="object-fit:${fit}" />`;
}
function renderIcon(comp, td) {
  const name = resolveValue(comp.name, td);
  return iconSvg(String(name));
}
function renderDivider(comp) {
  const axis = comp.axis || 'horizontal';
  return axis === 'vertical'
    ? `<div class="u-divider-v"></div>`
    : `<hr class="u-divider-h" />`;
}
function renderVideo(comp, td) {
  const url = resolveValue(comp.url, td);
  return `<video class="u-video" controls src="${escA(String(url))}"></video>`;
}
function renderAudio(comp, td) {
  const url = resolveValue(comp.url, td);
  const desc = comp.description ? resolveValue(comp.description, td) : '';
  return `<div class="u-audio-wrap">
    ${desc ? `<span class="u-audio-desc">${escH(String(desc))}</span>` : ''}
    <audio class="u-audio" controls src="${escA(String(url))}"></audio>
  </div>`;
}

// ── Card ──
function renderCard(comp, td) {
  const inner = comp.child ? renderComp(String(comp.child), td) : '';
  return `<div class="u-card${weightClass(comp)}">${inner}</div>`;
}

// ── Tabs ──
function renderTabs(comp, td) {
  if (!Array.isArray(comp.tabs) || !comp.tabs.length) return '';
  const tid = 'tabs_' + comp.id.replace(/[^a-z0-9]/gi, '_');
  const headers = comp.tabs.map((t, i) => {
    const title = t.title != null ? resolveValue(t.title, td) : `Tab ${i+1}`;
    return `<button class="u-tab-btn${i===0?' act':''}" onclick="switchTab('${tid}',${i},this)">${escH(String(title))}</button>`;
  }).join('');
  const panels = comp.tabs.map((t, i) =>
    `<div class="u-tab-panel${i===0?' act':''}" data-tid="${tid}" data-ti="${i}">${t.child ? renderComp(String(t.child), td) : ''}</div>`
  ).join('');
  return `<div class="u-tabs${weightClass(comp)}" id="${tid}"><div class="u-tabs-hd">${headers}</div>${panels}</div>`;
}
window.switchTab = function(tid, idx, btn) {
  document.querySelectorAll(`#${tid} .u-tab-btn`).forEach(b => b.classList.remove('act'));
  document.querySelectorAll(`[data-tid="${tid}"]`).forEach(p => p.classList.remove('act'));
  btn.classList.add('act');
  document.querySelector(`[data-tid="${tid}"][data-ti="${idx}"]`).classList.add('act');
};

// ── Modal ──
function renderModal(comp, td) {
  const mid = 'modal_' + comp.id.replace(/[^a-z0-9]/gi, '_');
  const triggerEl = comp.trigger ? renderComp(String(comp.trigger), td, mid) : '';
  const contentEl = comp.content ? renderComp(String(comp.content), td) : '';
  // Re-render trigger button with modal open logic injected
  const triggerComp = comp.trigger ? _compMap[comp.trigger] : null;
  let triggerHtml = '';
  if (triggerComp && triggerComp.component === 'Button') {
    triggerHtml = renderButtonWithClick(triggerComp, td, `openModal('${mid}')`);
  } else {
    triggerHtml = triggerEl;
  }
  return `
    ${triggerHtml}
    <div class="u-modal-bg" id="${mid}">
      <div class="u-modal-box">
        ${contentEl}
      </div>
    </div>`;
}
window.openModal = function(id) { document.getElementById(id).classList.add('open'); };
window.closeModalEl = function(id) { document.getElementById(id).classList.remove('open'); };
// Close modal on overlay click
document.addEventListener('click', e => {
  if (e.target.classList.contains('u-modal-bg')) e.target.classList.remove('open');
});

// ── Button ──
function renderButton(comp, td, overrideOnClick) {
  return renderButtonWithClick(comp, td, overrideOnClick || null);
}
function renderButtonWithClick(comp, td, onClickCode) {
  const variant = comp.variant || 'default';
  const labelComp = comp.child ? _compMap[String(comp.child)] : null;
  let inner = '';
  if (labelComp) {
    if (labelComp.component === 'Text') {
      inner = escH(String(resolveValue(labelComp.text, td)));
    } else if (labelComp.component === 'Icon') {
      inner = iconSvg(String(resolveValue(labelComp.name, td)));
    } else {
      inner = renderComp(String(comp.child), td);
    }
  }
  // Build onclick
  let oc = '';
  if (onClickCode) {
    oc = onClickCode;
  } else if (comp.action) {
    const act = comp.action;
    if (act.event) {
      oc = `handleAction(${JSON.stringify(act.event.name || '')})`;
    } else if (act.call === 'openUrl' && act.args && act.args.url) {
      oc = `window.open(${JSON.stringify(act.args.url)},'_blank')`;
    } else {
      oc = `handleAction(${JSON.stringify(JSON.stringify(act))})`;
    }
  }
  return `<button class="u-btn v-${escA(variant)}${weightClass(comp)}"${oc ? ` onclick="${escA(oc)}"` : ''} data-action-id="${escA(comp.id)}">${inner}</button>`;
}
window.handleAction = function(name) {
  console.log('[A2UI Action]', name);
  markChanged();
};

// ── TextField ──
function renderTextField(comp, td) {
  const label = comp.label != null ? resolveValue(comp.label, td) : '';
  const val = comp.value != null ? resolveValue(comp.value, td) : '';
  const variant = comp.variant || 'shortText';
  const fid = 'tf_' + comp.id.replace(/[^a-z0-9]/gi,'_');
  const dataField = `data-field="${escA(comp.id)}"`;
  if (variant === 'longText') {
    return `<div class="u-textfield${weightClass(comp)}">
      ${label ? `<label for="${fid}">${escH(String(label))}</label>` : ''}
      <textarea id="${fid}" ${dataField} oninput="markChanged()">${escH(String(val))}</textarea>
    </div>`;
  }
  const type = variant === 'number' ? 'number' : variant === 'obscured' ? 'password' : 'text';
  return `<div class="u-textfield${weightClass(comp)}">
    ${label ? `<label for="${fid}">${escH(String(label))}</label>` : ''}
    <input id="${fid}" type="${type}" value="${escA(String(val))}" ${dataField} oninput="markChanged()" />
  </div>`;
}

// ── CheckBox ──
function renderCheckBox(comp, td) {
  const label = comp.label != null ? resolveValue(comp.label, td) : '';
  const val = comp.value != null ? resolveValue(comp.value, td) : false;
  const fid = 'cb_' + comp.id.replace(/[^a-z0-9]/gi,'_');
  return `<label class="u-checkbox${weightClass(comp)}">
    <input type="checkbox" id="${fid}" data-field="${escA(comp.id)}"${val ? ' checked' : ''} onchange="markChanged()" />
    <span>${escH(String(label))}</span>
  </label>`;
}

// ── ChoicePicker ──
function renderChoicePicker(comp, td) {
  const label = comp.label != null ? resolveValue(comp.label, td) : '';
  const val = comp.value != null ? resolveValue(comp.value, td) : '';
  const opts = comp.choices || comp.options || [];
  const variant = comp.variant || 'mutuallyExclusive';
  const gid = 'cp_' + comp.id.replace(/[^a-z0-9]/gi,'_');

  // ChoicePicker 始终渲染为 chips（A2UI 规范不含 displayStyle 字段）
  {
    const chips = opts.map(o => {
      const ov = typeof o === 'string' ? o : o.value || '';
      const ol = typeof o === 'string' ? o : o.label || ov;
      const sel = (variant === 'multipleSelection' ? (Array.isArray(val) ? val.includes(ov) : String(val)===ov) : String(val)===ov);
      return `<span class="u-chip${sel?' sel':''}" data-field="${escA(comp.id)}" data-val="${escA(ov)}" onclick="toggleChip(this,'${gid}',${variant==='multipleSelection'})">${escH(ol)}</span>`;
    }).join('');
    return `<div class="u-choice${weightClass(comp)}">
      ${label ? `<span class="u-choice-label">${escH(String(label))}</span>` : ''}
      <div class="u-choice-chips" id="${gid}">${chips}</div>
    </div>`;
  }
}
window.toggleChip = function(el, gid, multi) {
  if (!multi) {
    document.querySelectorAll(`#${gid} .u-chip`).forEach(c => c.classList.remove('sel'));
    el.classList.add('sel');
  } else {
    el.classList.toggle('sel');
  }
  markChanged();
};

// ── Slider ──
function renderSlider(comp, td) {
  const label = comp.label != null ? resolveValue(comp.label, td) : '';
  const val = Number(comp.value != null ? resolveValue(comp.value, td) : 0) || 0;
  const min = comp.min || 0, max = comp.max || 100;
  const fid = 'sl_' + comp.id.replace(/[^a-z0-9]/gi,'_');
  return `<div class="u-slider${weightClass(comp)}">
    ${label ? `<label for="${fid}">${escH(String(label))}<span id="${fid}_val" style="float:right;color:#9aa0a6">${val}</span></label>` : ''}
    <input type="range" id="${fid}" min="${min}" max="${max}" value="${val}" data-field="${escA(comp.id)}"
      oninput="document.getElementById('${fid}_val').textContent=this.value;markChanged()" />
  </div>`;
}

// ── DateTimeInput ──
function renderDateTimeInput(comp, td) {
  const label = comp.label != null ? resolveValue(comp.label, td) : '';
  const val = comp.value != null ? resolveValue(comp.value, td) : '';
  const fid = 'dt_' + comp.id.replace(/[^a-z0-9]/gi,'_');
  const type = (comp.enableDate && comp.enableTime) ? 'datetime-local'
    : comp.enableDate ? 'date'
    : comp.enableTime ? 'time'
    : 'date';
  return `<div class="u-datetime${weightClass(comp)}">
    ${label ? `<label for="${fid}">${escH(String(label))}</label>` : ''}
    <input type="${type}" id="${fid}" value="${escA(String(val))}" data-field="${escA(comp.id)}" onchange="markChanged()" />
  </div>`;
}

// ── Escape helpers ──
function escH(s) {
  if (s==null) return '';
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escA(s) {
  if (s==null) return '';
  return String(s).replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function pgResolveThemeTokens(createSurfaceMsg) {
  const base = (createSurfaceMsg.themeRef) ? Object.assign({}, PG_THEME_DEFAULTS) : {};
  return Object.assign(base, createSurfaceMsg.theme || {});
}
function pgApplyThemeTokens(el, tokens) {
  const target = el || document.documentElement;
  for (const [key, val] of Object.entries(tokens)) {

// ═══════════════════════════════════════════
// 解析三段式消息
// ═══════════════════════════════════════════
function parseMessages(msgs) {
  _surface = null; _compMap = {}; _dataModel = {};
  if (!Array.isArray(msgs)) {
    // 尝试兼容单个消息对象
    msgs = [msgs];
  }
  for (const msg of msgs) {
    if (msg.createSurface) {
      _surface = msg.createSurface;
    } else if (msg.updateComponents) {
      const comps = msg.updateComponents.components || [];
      for (const comp of comps) {
        if (comp.id) _compMap[comp.id] = comp;
      }
    } else if (msg.updateDataModel) {
      _dataModel = msg.updateDataModel.contents || {};
    }
  }
  if (!_surface && Object.keys(_compMap).length > 0) {
    _surface = { surfaceId: 'unknown' };
  }
}

// ═══════════════════════════════════════════
// 找根组件（第一个没被其他人引用的组件）
// ═══════════════════════════════════════════
function findRootId() {
  const allIds = Object.keys(_compMap);
  if (allIds.length === 0) return null;
  // 收集所有被引用的 ID
  const referenced = new Set();
  for (const comp of Object.values(_compMap)) {
    // children
    if (Array.isArray(comp.children)) comp.children.forEach(id => referenced.add(String(id)));
    else if (comp.children && comp.children.componentId) referenced.add(comp.children.componentId);
    // child / trigger / content
    ['child','trigger','content'].forEach(f => { if (comp[f]) referenced.add(String(comp[f])); });
    // tabs
    if (Array.isArray(comp.tabs)) comp.tabs.forEach(t => { if (t.child) referenced.add(String(t.child)); });
  }
  // 未被引用的 = 根
  const roots = allIds.filter(id => !referenced.has(id));
  if (roots.length === 1) return roots[0];
  if (roots.length > 1) {
    // 优先选名为 root/main/surface/page 的
    for (const r of ['root','main','surface','page','layout']) {
      if (roots.includes(r)) return r;
    }
    return roots[0];
  }
  // fallback
  return allIds[0];
}

// ═══════════════════════════════════════════
// 主渲染入口
// ═══════════════════════════════════════════
function doRender() {
  const text = document.getElementById('json-input').value.trim();
  if (!text) { setStatus('err', '✗ 请先输入 JSON'); return; }

  let parsed;
  try { parsed = JSON.parse(text); }
  catch(e) { setStatus('err', '✗ JSON 解析失败: ' + e.message); return; }

  try {
    parseMessages(parsed);
  } catch(e) {
    setStatus('err', '✗ 消息解析失败: ' + e.message);
    return;
  }

  // themeRef 支持：解析 createSurface 的 themeRef + theme 并应用 CSS 变量
  if (_surface) {
    const tokens = pgResolveThemeTokens(_surface);
    const preview = document.getElementById('preview');
    pgApplyThemeTokens(preview, tokens);
  }

  _rawMessages = parsed;

  const rootId = findRootId();
  const preview = document.getElementById('preview');
  document.getElementById('empty').style.display = 'none';
  preview.style.display = 'block';

  if (!rootId) {
    preview.innerHTML = `<div class="render-err"><strong>找不到组件</strong><br>updateComponents.components 数组为空或缺失。</div>`;
    setStatus('err', '✗ 无可渲染组件');
    return;
  }

  try {
    preview.innerHTML = renderComp(rootId, null);
    setStatus('ok', `✓ 渲染成功（根组件: ${rootId}）`);
    document.getElementById('out-btn').disabled = false;
    document.getElementById('chg-pill').classList.remove('show');
  } catch(e) {
    preview.innerHTML = `<div class="render-err"><strong>渲染错误：</strong><br>${escH(e.message)}<code>${escH(e.stack||'')}</code></div>`;
    setStatus('err', '✗ 渲染异常');
    console.error('[A2UI Render]', e);
  }
}

// ═══════════════════════════════════════════
// 收集 DOM 状态 → 回写 dataModel
// ═══════════════════════════════════════════
function collectState() {
  const preview = document.getElementById('preview');
  const updated = JSON.parse(JSON.stringify(_rawMessages || []));

  // 找 updateDataModel 消息
  let dmMsg = null;
  for (const msg of updated) {
    if (msg.updateDataModel) { dmMsg = msg.updateDataModel; break; }
  }
  if (!dmMsg) {
    // 追加一个
    const sid = _surface ? _surface.surfaceId : 'unknown';
    updated.push({ updateDataModel: { surfaceId: sid, contents: {} } });
    dmMsg = updated[updated.length-1].updateDataModel;
  }

  const dm = JSON.parse(JSON.stringify(_dataModel));

  // ── 1. 普通表单控件（input / textarea / select）──
  preview.querySelectorAll('[data-field]').forEach(el => {
    if (el.classList.contains('u-chip')) return; // chip 单独处理
    const fid = el.getAttribute('data-field');
    const comp = _compMap[fid];
    if (!comp) return;
    let newVal;
    if (el.tagName === 'INPUT' && el.type === 'checkbox') newVal = el.checked;
    else if (el.tagName === 'INPUT' || el.tagName === 'TEXTAREA') newVal = el.value;
    else if (el.tagName === 'SELECT') newVal = el.value;
    else return;
    writeBack(comp, fid, newVal, dm, updated);
  });

  // ── 2. ChoicePicker（chips 容器）──
  // 通过 data-choice-id 找到每个 ChoicePicker 的容器，收集选中的 chip
  preview.querySelectorAll('.u-choice-chips[id]').forEach(container => {
    // gid = 'cp_' + comp.id，找回 comp.id
    const gid = container.id; // e.g. 'cp_city_picker'
    // 找对应的 comp（id 存在 chip 的 data-field 中）
    const firstChip = container.querySelector('.u-chip[data-field]');
    if (!firstChip) return;
    const fid = firstChip.getAttribute('data-field');
    const comp = _compMap[fid];
    if (!comp) return;
    const variant = comp.variant || 'mutuallyExclusive';
    const selChips = Array.from(container.querySelectorAll('.u-chip.sel'));
    const selVals = selChips.map(c => c.getAttribute('data-val'));
    // mutuallyExclusive → 单选，但规范要求写入数组格式
    const newVal = variant === 'multipleSelection' ? selVals : (selVals.length ? selVals : []);
    writeBack(comp, fid, newVal, dm, updated);
  });

  // ── 3. ChoicePicker radio/checkbox 模式 ──
  const processedChoiceGroups = new Set();
  preview.querySelectorAll('input[type=radio][name], input[type=checkbox][name]').forEach(el => {
    const gname = el.getAttribute('name');
    if (processedChoiceGroups.has(gname)) return;
    processedChoiceGroups.add(gname);
    const isMulti = el.type === 'checkbox';
    // 找 comp.id：radio/checkbox 的 id 格式为 gname_value，gname 格式为 cp_compid
    const compId = gname.replace(/^cp_/, '').replace(/_/g, '-'); // 近似还原
    // 找更准确的方式：通过 gname 找第一个 label 里的 input，再找 comp
    const allInGroup = preview.querySelectorAll(`input[name="${gname}"]`);
    if (!allInGroup.length) return;
    // 找 comp：通过 container 往上找 .u-choice 再找关联 comp
    // 简单方法：gname = 'cp_' + compId（compId 是 id 字段去除特殊字符）
    // 遍历 _compMap 找 component=ChoicePicker 且 id 匹配
    const compEntry = Object.values(_compMap).find(c =>
      c.component === 'ChoicePicker' &&
      ('cp_' + c.id.replace(/[^a-z0-9]/gi,'_')) === gname
    );
    if (!compEntry) return;
    const selInputs = Array.from(allInGroup).filter(i => i.checked);
    const selVals = selInputs.map(i => i.value);
    const newVal = isMulti ? selVals : (selVals.length ? selVals : []);
    writeBack(compEntry, compEntry.id, newVal, dm, updated);
  });

  dmMsg.contents = dm;
  return updated;
}

// ── 写回辅助函数 ──
function writeBack(comp, fid, newVal, dm, updated) {
  const binding = comp.value;
  if (binding && typeof binding === 'object' && binding.path && binding.path.startsWith('/')) {
    setPointer(dm, binding.path, newVal);
  } else {
    for (const msg of updated) {
      if (msg.updateComponents) {
        const c = msg.updateComponents.components.find(x => x.id === fid);
        if (c) { c.value = newVal; }
      }
    }
  }
}

function setPointer(obj, pointer, value) {
  const parts = pointer.replace(/^\//, '').split('/').map(p => p.replace(/~1/g,'/').replace(/~0/g,'~'));
  let cur = obj;
  for (let i = 0; i < parts.length - 1; i++) {
    if (cur[parts[i]] == null) cur[parts[i]] = {};
    cur = cur[parts[i]];
  }
  cur[parts[parts.length-1]] = value;
}

function openOut() {
  const out = collectState();

  document.getElementById('copy-tip').textContent = '点击「复制」可将 JSON 复制到剪贴板';
  document.getElementById('copy-tip').className = 'copy-tip';
  document.getElementById('out-modal').classList.add('open');
}
function closeOut() { document.getElementById('out-modal').classList.remove('open'); }
function copyOut() {
  const el = document.getElementById('out-code');
  el.select();
  navigator.clipboard.writeText(el.value).then(() => {
    const tip = document.getElementById('copy-tip');
    tip.textContent = '✓ 已复制！'; tip.className = 'copy-tip ok';
    setTimeout(() => { tip.textContent='点击「复制」可将 JSON 复制到剪贴板'; tip.className='copy-tip'; }, 2000);
  }).catch(() => document.execCommand('copy'));
}
function dlOut() {
  const blob = new Blob([document.getElementById('out-code').value], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = ((_surface && _surface.surfaceId) || 'a2ui-output') + '.json';
  a.click(); URL.revokeObjectURL(a.href);
}
document.getElementById('out-modal').addEventListener('click', e => {
  if (e.target === document.getElementById('out-modal')) closeOut();
});

// Editor helpers

function setStatus(type, msg) {
  const el = document.getElementById('ed-st');
  el.className = 'ed-status s-' + type;
  el.textContent = msg;
}

const jinput = document.getElementById('json-input');
jinput.addEventListener('input', () => {
  document.getElementById('lc').textContent = jinput.value.split('\n').length + ' 行';
  try { JSON.parse(jinput.value); setStatus('ok','✓ 格式正确'); }
  catch(e) { setStatus('err','✗ ' + e.message.slice(0,60)); }
  if (!jinput.value.trim()) setStatus('idle','— 请输入 JSON 后点击渲染');
});
jinput.addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const s=jinput.selectionStart, end=jinput.selectionEnd;
    jinput.value = jinput.value.slice(0,s)+'  '+jinput.value.slice(end);
    jinput.selectionStart = jinput.selectionEnd = s+2;
  }
  if ((e.ctrlKey||e.metaKey) && e.key==='Enter') doRender();
  if ((e.ctrlKey||e.metaKey) && e.shiftKey && e.key==='F') { e.preventDefault(); fmtJson(); }
});

function fmtJson() {
  try {
    jinput.value = JSON.stringify(JSON.parse(jinput.value), null, 2);
    document.getElementById('lc').textContent = jinput.value.split('\n').length + ' 行';
    setStatus('ok','✓ 已格式化');
  } catch(e) { setStatus('err','✗ 格式错误，无法格式化'); }
}

function clearAll() {
  jinput.value = '';
  setStatus('idle','— 请输入 JSON 后点击渲染');
  document.getElementById('lc').textContent = '';
  document.getElementById('preview').style.display='none';
  document.getElementById('preview').innerHTML='';
  document.getElementById('empty').style.display='flex';
  document.getElementById('out-btn').disabled=true;
  document.getElementById('chg-pill').classList.remove('show');
  _surface=null; _compMap={}; _dataModel={}; _rawMessages=[];
}

window.markChanged = function() {

};

(function(){

  let drag=false, sx=0, sw=0;
