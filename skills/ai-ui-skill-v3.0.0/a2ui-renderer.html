<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>A2UI Renderer</title>
  <style>
    /* ── 1. CSS Reset & Base ── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; font-family: var(--a2ui-font-family); font-size: var(--a2ui-font-size-base); color: var(--a2ui-text); background: #1e1e2e; -webkit-font-smoothing: antialiased; }

    /* ── 2. A2UI Default Token CSS Variables ── */
    :root {
      /* Color */
      --a2ui-primary: #1677FF;
      --a2ui-primary-hover: #4096FF;
      --a2ui-primary-text: #FFFFFF;
      --a2ui-success: #16a34a;
      --a2ui-error: #cf1322;
      --a2ui-warning: #d97706;
      --a2ui-text: #1a1a2e;
      --a2ui-text-secondary: #5f6368;
      --a2ui-text-disabled: #9aa0a6;
      --a2ui-bg: #f0f2f5;
      --a2ui-surface: #ffffff;
      --a2ui-border: #e0e3e8;
      --a2ui-input-bg: #ffffff;
      --a2ui-input-focus-border: #1677FF;
      --a2ui-overlay-bg: rgba(0,0,0,0.45);
      /* Border Radius */
      --a2ui-radius-sm: 4px;
      --a2ui-radius-md: 8px;
      --a2ui-radius-lg: 12px;
      --a2ui-radius-full: 9999px;
      /* Typography */
      --a2ui-font-family: "PingFang SC", "Helvetica Neue", Arial, sans-serif;
      --a2ui-font-size-base: 14px;
      --a2ui-font-size-sm: 12px;
      --a2ui-font-size-lg: 16px;
      --a2ui-font-size-xl: 20px;
      --a2ui-font-size-xxl: 24px;
      --a2ui-font-size-display: 30px;
      --a2ui-font-weight-normal: 400;
      --a2ui-font-weight-medium: 500;
      --a2ui-font-weight-bold: 700;
      --a2ui-line-height: 1.5715;
      /* Spacing */
      --a2ui-space-xs: 4px;
      --a2ui-space-sm: 8px;
      --a2ui-space-md: 12px;
      --a2ui-space-lg: 16px;
      --a2ui-space-xl: 24px;
      /* Shadow */
      --a2ui-shadow-sm: 0 1px 4px rgba(0,0,0,0.06);
      --a2ui-shadow-md: 0 4px 12px rgba(0,0,0,0.1);
      /* Button */
      --a2ui-btn-padding-h: 16px;
      --a2ui-btn-padding-v: 6px;
      --a2ui-btn-default-bg: #ffffff;
      --a2ui-btn-default-border: #e0e3e8;
      --a2ui-btn-default-text: #1a1a2e;
      /* Input */
      --a2ui-input-height: 36px;
      --a2ui-input-border: #e0e3e8;
      /* Slider */
      --a2ui-slider-track: #e0e3e8;
      --a2ui-slider-fill: #1677FF;
      --a2ui-slider-thumb: #1677FF;
      /* Tabs */
      --a2ui-tabs-active: #1677FF;
      --a2ui-tabs-inactive: #5f6368;
      --a2ui-tabs-indicator: #1677FF;
    }

    /* ── 3. App Shell Layout ── */
    .app-shell {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* Top Bar */
    .top-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      height: 52px;
      background: #13131f;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      z-index: 10;
    }
    .top-bar .logo {
      display: flex;
      align-items: center;
      gap: 8px;
      color: #fff;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.02em;
    }
    .top-bar .logo svg { opacity: 0.9; }
    .top-bar .badge {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 6px;
      background: rgba(22, 119, 255, 0.25);
      color: #60a5fa;
      border-radius: 4px;
      border: 1px solid rgba(96,165,250,0.3);
    }
    .top-bar .actions { margin-left: auto; display: flex; gap: 8px; }
    .top-bar .top-btn {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 5px 12px;
      border-radius: 6px;
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(255,255,255,0.05);
      color: rgba(255,255,255,0.75);
      font-size: 12px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .top-bar .top-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .top-bar .top-btn.primary { background: #1677FF; border-color: #1677FF; color: #fff; }
    .top-bar .top-btn.primary:hover { background: #4096FF; border-color: #4096FF; }

    /* Main Content */
    .main-content {
      display: flex;
      flex: 1;
      overflow: hidden;
    }

    /* ── 4. Left Panel ── */
    .left-panel {
      display: flex;
      flex-direction: column;
      width: 420px;
      min-width: 300px;
      max-width: 50%;
      background: #13131f;
      border-right: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
      overflow: hidden;
    }

    /* Resizer */
    .resizer {
      width: 5px;
      background: transparent;
      cursor: col-resize;
      flex-shrink: 0;
      position: relative;
      transition: background 0.15s;
    }
    .resizer:hover, .resizer.dragging { background: rgba(22,119,255,0.5); }

    /* ── 4a. Theme Upload Zone ── */
    .theme-section {
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.08);
      flex-shrink: 0;
    }
    .section-label {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      margin-bottom: 10px;
    }
    .upload-zone {
      position: relative;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 12px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(255,255,255,0.15);
      border-radius: 8px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .upload-zone:hover { background: rgba(255,255,255,0.06); border-color: rgba(22,119,255,0.5); }
    .upload-zone.drag-over { background: rgba(22,119,255,0.08); border-color: #1677FF; }
    .upload-zone.loaded { border-style: solid; border-color: rgba(22,164,74,0.5); background: rgba(22,164,74,0.05); }
    .upload-zone input[type="file"] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    .upload-icon {
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 6px;
      background: rgba(22,119,255,0.12);
      flex-shrink: 0;
    }
    .upload-icon svg { color: #60a5fa; }
    .upload-info { flex: 1; min-width: 0; }
    .upload-title { font-size: 12px; font-weight: 500; color: rgba(255,255,255,0.75); }
    .upload-sub { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .upload-clear {
      padding: 3px 6px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.12);
      background: transparent;
      color: rgba(255,255,255,0.45);
      font-size: 10px;
      cursor: pointer;
      flex-shrink: 0;
      transition: all 0.15s;
    }
    .upload-clear:hover { border-color: rgba(207,19,34,0.5); color: #f87171; }

    /* Token Preview */
    .token-preview {
      margin-top: 8px;
      display: none;
      gap: 4px;
      flex-wrap: wrap;
    }
    .token-preview.visible { display: flex; }
    .token-chip {
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 2px 7px;
      border-radius: 12px;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 10px;
      color: rgba(255,255,255,0.5);
    }
    .token-chip .swatch {
      width: 8px; height: 8px;
      border-radius: 2px;
      border: 1px solid rgba(255,255,255,0.1);
      flex-shrink: 0;
    }

    /* ── 4b. JSON Editor ── */
    .editor-section {
      display: flex;
      flex-direction: column;
      flex: 1;
      overflow: hidden;
      padding: 0;
    }
    .editor-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 16px 8px;
      flex-shrink: 0;
    }
    .editor-tabs {
      display: flex;
      gap: 2px;
    }
    .editor-tab {
      padding: 3px 10px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.35);
      cursor: pointer;
      transition: all 0.15s;
      border: none;
      background: transparent;
    }
    .editor-tab.active { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
    .editor-tab:hover:not(.active) { color: rgba(255,255,255,0.6); }
    .editor-actions { display: flex; gap: 6px; }
    .editor-btn {
      padding: 3px 9px;
      border-radius: 5px;
      border: 1px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.04);
      color: rgba(255,255,255,0.5);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .editor-btn:hover { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.8); }
    .editor-btn.render-btn { background: rgba(22,119,255,0.15); border-color: rgba(22,119,255,0.4); color: #60a5fa; }
    .editor-btn.render-btn:hover { background: rgba(22,119,255,0.25); color: #93c5fd; }

    .editor-wrap {
      flex: 1;
      overflow: hidden;
      position: relative;
    }
    #json-editor {
      width: 100%;
      height: 100%;
      background: #0d0d1a;
      border: none;
      outline: none;
      resize: none;
      padding: 12px 16px;
      font-family: "JetBrains Mono", "Fira Code", "Cascadia Code", Consolas, monospace;
      font-size: 12px;
      line-height: 1.65;
      color: #e2e8f0;
      tab-size: 2;
      caret-color: #60a5fa;
    }
    #json-editor::selection { background: rgba(22,119,255,0.3); }
    .editor-status {
      padding: 5px 16px;
      font-size: 10px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: rgba(255,255,255,0.3);
      border-top: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .status-dot { width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.2); flex-shrink: 0; }
    .status-dot.ok { background: #4ade80; }
    .status-dot.error { background: #f87171; }

    /* ── 5. Right Panel (Render Area) ── */
    .right-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: #1a1a2e;
    }
    .render-toolbar {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 16px;
      height: 42px;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid rgba(255,255,255,0.06);
      flex-shrink: 0;
    }
    .render-label {
      font-size: 11px;
      font-weight: 500;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.06em;
      text-transform: uppercase;
    }
    .render-surface-id {
      font-size: 11px;
      color: rgba(96,165,250,0.8);
      font-family: monospace;
    }
    .render-mode-btns { margin-left: auto; display: flex; gap: 4px; }
    .render-mode-btn {
      padding: 3px 9px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.08);
      background: transparent;
      color: rgba(255,255,255,0.3);
      font-size: 11px;
      cursor: pointer;
      transition: all 0.15s;
    }
    .render-mode-btn.active { background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.7); }

    .render-viewport {
      flex: 1;
      overflow: auto;
      padding: 24px;
      display: flex;
      align-items: flex-start;
      justify-content: center;
    }
    .render-viewport.device-mobile { align-items: flex-start; }
    .render-viewport.device-full { padding: 16px; }

    /* Device frames */
    .device-frame {
      background: var(--a2ui-surface);
      border-radius: var(--a2ui-radius-md);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.06), 0 24px 64px rgba(0,0,0,0.4);
      overflow: hidden;
      transition: width 0.2s;
    }
    .device-frame.mobile { width: 390px; min-height: 600px; }
    .device-frame.tablet { width: 768px; min-height: 600px; }
    .device-frame.full { width: 100%; }

    /* Render area inner */
    #render-root {
      padding: var(--a2ui-space-xl);
      min-height: 100%;
    }

    /* ── 6. Empty / Error States ── */
    .empty-state {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 60px 24px;
      text-align: center;
      color: rgba(255,255,255,0.2);
      gap: 12px;
    }
    .empty-state svg { opacity: 0.25; }
    .empty-state h3 { font-size: 14px; font-weight: 500; color: rgba(255,255,255,0.3); }
    .empty-state p { font-size: 12px; line-height: 1.6; max-width: 280px; }

    .error-banner {
      margin: 16px;
      padding: 10px 14px;
      background: rgba(207,19,34,0.1);
      border: 1px solid rgba(207,19,34,0.3);
      border-radius: 8px;
      font-size: 12px;
      color: #fca5a5;
      font-family: monospace;
      white-space: pre-wrap;
      display: none;
    }
    .error-banner.visible { display: block; }

    /* ── 7. Notification Toast ── */
    .toast-container { position: fixed; top: 64px; right: 16px; z-index: 9999; display: flex; flex-direction: column; gap: 8px; pointer-events: none; }
    .toast {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 14px;
      background: #1e1e3a;
      border-radius: 8px;
      border: 1px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 24px rgba(0,0,0,0.3);
      font-size: 12px;
      color: rgba(255,255,255,0.75);
      pointer-events: auto;
      animation: toastIn 0.2s ease;
      max-width: 320px;
    }
    .toast.success { border-color: rgba(74,222,128,0.3); }
    .toast.error { border-color: rgba(248,113,113,0.3); }
    .toast.info { border-color: rgba(96,165,250,0.3); }
    @keyframes toastIn { from { opacity:0; transform: translateX(16px); } to { opacity:1; transform: none; } }
    @keyframes toastOut { to { opacity:0; transform: translateX(16px); } }
    .toast.removing { animation: toastOut 0.2s ease forwards; }

    /* ── 8. Scrollbar ── */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(255,255,255,0.2); }
  </style>
</head>
<body>

<div class="app-shell">

  <!-- ── Top Bar ── -->
  <div class="top-bar">
    <div class="logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <rect x="3" y="3" width="18" height="18" rx="3"/>
        <path d="M9 9h6M9 12h4M9 15h5"/>
      </svg>
      A2UI Renderer
    </div>
    <span class="badge">v0.9</span>
    <div class="actions">
      <button class="top-btn" onclick="loadExample('dashboard')">示例：Dashboard</button>
      <button class="top-btn" onclick="loadExample('list')">示例：列表页</button>
      <button class="top-btn" onclick="loadExample('form')">示例：表单</button>
      <button class="top-btn primary" onclick="renderJSON()">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polygon points="5,3 19,12 5,21"/></svg>
        渲染
      </button>
    </div>
  </div>

  <!-- ── Main ── -->
  <div class="main-content">

    <!-- Left Panel -->
    <div class="left-panel" id="leftPanel">

      <!-- Theme Upload -->
      <div class="theme-section">
        <div class="section-label">Theme</div>
        <div class="upload-zone" id="uploadZone"
             ondragover="handleDragOver(event)"
             ondragleave="handleDragLeave(event)"
             ondrop="handleDrop(event)">
          <input type="file" accept=".md,.txt,.json" id="themeFileInput" onchange="handleFileSelect(event)" />
          <div class="upload-icon">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/>
              <polyline points="17,8 12,3 7,8"/>
              <line x1="12" y1="3" x2="12" y2="15"/>
            </svg>
          </div>
          <div class="upload-info">
            <div class="upload-title" id="uploadTitle">上传 theme.md 文件</div>
            <div class="upload-sub" id="uploadSub">拖拽或点击选择 · 支持 .md / .txt / .json</div>
          </div>
          <button class="upload-clear" id="uploadClear" style="display:none" onclick="clearTheme(event)">清除</button>
        </div>
        <div class="token-preview" id="tokenPreview"></div>
      </div>

      <!-- JSON Editor -->
      <div class="editor-section">
        <div class="editor-header">
          <div class="section-label" style="margin:0">JSON Input</div>
          <div class="editor-actions">
            <button class="editor-btn" onclick="formatJSON()">Format</button>
            <button class="editor-btn" onclick="clearEditor()">Clear</button>
            <button class="editor-btn render-btn" onclick="renderJSON()">▶ Render</button>
          </div>
        </div>
        <div class="editor-wrap">
          <textarea id="json-editor" spellcheck="false" placeholder='[
  { "createSurface": { "surfaceId": "my-surface", ... } },
  { "updateComponents": { ... } },
  { "updateDataModel": { ... } }
]'></textarea>
        </div>
        <div class="editor-status">
          <div class="status-dot" id="statusDot"></div>
          <span id="statusText">粘贴 A2UI JSON 后点击渲染</span>
        </div>
      </div>

    </div><!-- /left-panel -->

    <!-- Resizer -->
    <div class="resizer" id="resizer"></div>

    <!-- Right Panel -->
    <div class="right-panel">
      <div class="render-toolbar">
        <span class="render-label">Preview</span>
        <span class="render-surface-id" id="surfaceIdLabel"></span>
        <div class="render-mode-btns">
          <button class="render-mode-btn active" data-mode="full" onclick="setDeviceMode('full', this)">Full</button>
          <button class="render-mode-btn" data-mode="tablet" onclick="setDeviceMode('tablet', this)">Tablet</button>
          <button class="render-mode-btn" data-mode="mobile" onclick="setDeviceMode('mobile', this)">Mobile</button>
        </div>
      </div>
      <div class="render-viewport" id="renderViewport">
        <div class="device-frame full" id="deviceFrame">
          <div id="render-root">
            <div class="empty-state">
              <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                <rect x="3" y="3" width="18" height="18" rx="3"/>
                <path d="M9 9h6M9 12h4M9 15h5"/>
              </svg>
              <h3>渲染区域</h3>
              <p>在左侧粘贴 A2UI v0.9 JSON，点击「渲染」即可在此预览界面效果</p>
            </div>
          </div>
        </div>
      </div>
      <div class="error-banner" id="errorBanner"></div>
    </div><!-- /right-panel -->

  </div><!-- /main-content -->
</div><!-- /app-shell -->

<!-- Toast Container -->
<div class="toast-container" id="toastContainer"></div>

<script>
/* ════════════════════════════════════════════
   PART 2A — Theme Parser
   ════════════════════════════════════════════ */

/** token name → CSS variable name (from theme.md) */
const TOKEN_MAP = {
  primaryColor: '--a2ui-primary',
  primaryHoverColor: '--a2ui-primary-hover',
  primaryTextColor: '--a2ui-primary-text',
  successColor: '--a2ui-success',
  errorColor: '--a2ui-error',
  warningColor: '--a2ui-warning',
  textColor: '--a2ui-text',
  textSecondaryColor: '--a2ui-text-secondary',
  textDisabledColor: '--a2ui-text-disabled',
  bgColor: '--a2ui-bg',
  surfaceColor: '--a2ui-surface',
  borderColor: '--a2ui-border',
  inputBgColor: '--a2ui-input-bg',
  inputFocusBorderColor: '--a2ui-input-focus-border',
  overlayBgColor: '--a2ui-overlay-bg',
  borderRadiusSm: '--a2ui-radius-sm',
  borderRadiusMd: '--a2ui-radius-md',
  borderRadiusLg: '--a2ui-radius-lg',
  borderRadiusFull: '--a2ui-radius-full',
  fontFamily: '--a2ui-font-family',
  fontSizeBase: '--a2ui-font-size-base',
  fontSizeSm: '--a2ui-font-size-sm',
  fontSizeLg: '--a2ui-font-size-lg',
  fontSizeXl: '--a2ui-font-size-xl',
  fontSizeXxl: '--a2ui-font-size-xxl',
  fontSizeDisplay: '--a2ui-font-size-display',
  fontWeightNormal: '--a2ui-font-weight-normal',
  fontWeightMedium: '--a2ui-font-weight-medium',
  fontWeightBold: '--a2ui-font-weight-bold',
  lineHeightBase: '--a2ui-line-height',
  spacingXs: '--a2ui-space-xs',
  spacingSm: '--a2ui-space-sm',
  spacingMd: '--a2ui-space-md',
  spacingLg: '--a2ui-space-lg',
  spacingXl: '--a2ui-space-xl',
  shadowSm: '--a2ui-shadow-sm',
  shadowMd: '--a2ui-shadow-md',
  btnPaddingH: '--a2ui-btn-padding-h',
  btnPaddingV: '--a2ui-btn-padding-v',
  btnDefaultBg: '--a2ui-btn-default-bg',
  btnDefaultBorderColor: '--a2ui-btn-default-border',
  btnDefaultTextColor: '--a2ui-btn-default-text',
  inputHeight: '--a2ui-input-height',
  inputBorderColor: '--a2ui-input-border',
  sliderTrackColor: '--a2ui-slider-track',
  sliderFillColor: '--a2ui-slider-fill',
  sliderThumbColor: '--a2ui-slider-thumb',
  tabsActiveColor: '--a2ui-tabs-active',
  tabsInactiveColor: '--a2ui-tabs-inactive',
  tabsIndicatorColor: '--a2ui-tabs-indicator',
};

const COLOR_TOKENS = ['primaryColor','primaryHoverColor','successColor','errorColor','warningColor','textColor','bgColor','surfaceColor','borderColor'];

let currentThemeTokens = {};

/**
 * Parse theme.md content.
 * Supports two formats:
 *   1. Markdown table row:  | token | value | ...
 *   2. Plain key:value or key = value lines
 *   3. JSON object (if user uploads a .json)
 */
function parseThemeMd(content) {
  const tokens = {};

  // Try JSON first
  const trimmed = content.trim();
  if (trimmed.startsWith('{')) {
    try {
      const obj = JSON.parse(trimmed);
      Object.entries(obj).forEach(([k, v]) => { if (TOKEN_MAP[k]) tokens[k] = String(v); });
      return tokens;
    } catch {}
  }

  // Parse markdown table rows:  | `token` | `#value` | ... or | token | value | ...
  const tableRow = /^\|\s*`?(\w+)`?\s*\|\s*`?([^|`]+)`?\s*\|/gm;
  let m;
  while ((m = tableRow.exec(content)) !== null) {
    const key = m[1].trim();
    const val = m[2].trim();
    if (TOKEN_MAP[key] && val && val !== 'cssVar' && val !== '说明' && val !== 'token' && val !== '默认值') {
      tokens[key] = val;
    }
  }

  // Also parse plain  key: value  or  key = value
  const plain = /^[\s]*(\w+)\s*[:=]\s*(.+)$/gm;
  while ((m = plain.exec(content)) !== null) {
    const key = m[1].trim();
    const val = m[2].trim().replace(/['"]/g, '');
    if (TOKEN_MAP[key] && val) tokens[key] = val;
  }

  return tokens;
}

function applyThemeTokens(tokens) {
  const root = document.documentElement;
  Object.entries(tokens).forEach(([key, val]) => {
    const cssVar = TOKEN_MAP[key];
    if (cssVar) root.style.setProperty(cssVar, val);
  });
  currentThemeTokens = tokens;
  renderTokenPreview(tokens);
}

function resetThemeTokens() {
  const root = document.documentElement;
  Object.values(TOKEN_MAP).forEach(v => root.style.removeProperty(v));
  currentThemeTokens = {};
  renderTokenPreview({});
}

function renderTokenPreview(tokens) {
  const preview = document.getElementById('tokenPreview');
  const colorEntries = COLOR_TOKENS.filter(k => tokens[k]);
  if (!colorEntries.length) { preview.classList.remove('visible'); preview.innerHTML = ''; return; }
  preview.innerHTML = colorEntries.map(k =>
    `<span class="token-chip"><span class="swatch" style="background:${tokens[k]}"></span>${k.replace('Color','')}</span>`
  ).join('');
  preview.classList.add('visible');
}

/* ════════════════════════════════════════════
   PART 2B — File Upload Handlers
   ════════════════════════════════════════════ */

function handleFileSelect(e) {
  const file = e.target.files[0];
  if (file) processThemeFile(file);
}
function handleDragOver(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.add('drag-over');
}
function handleDragLeave(e) {
  document.getElementById('uploadZone').classList.remove('drag-over');
}
function handleDrop(e) {
  e.preventDefault();
  document.getElementById('uploadZone').classList.remove('drag-over');
  const file = e.dataTransfer.files[0];
  if (file) processThemeFile(file);
}
function processThemeFile(file) {
  const reader = new FileReader();
  reader.onload = (e) => {
    const content = e.target.result;
    const tokens = parseThemeMd(content);
    const count = Object.keys(tokens).length;
    if (count === 0) {
      showToast('未识别到 theme token，请检查文件格式', 'error');
      return;
    }
    applyThemeTokens(tokens);
    setUploadLoaded(file.name, `已解析 ${count} 个 token`);
    showToast(`✓ 已应用 theme：${count} 个 token`, 'success');
    // Re-render if there's already rendered content
    if (document.getElementById('render-root').dataset.rendered === '1') renderJSON();
  };
  reader.readAsText(file, 'UTF-8');
}
function setUploadLoaded(name, sub) {
  document.getElementById('uploadZone').classList.add('loaded');
  document.getElementById('uploadTitle').textContent = name;
  document.getElementById('uploadSub').textContent = sub;
  document.getElementById('uploadClear').style.display = 'block';
}
function clearTheme(e) {
  e.stopPropagation();
  resetThemeTokens();
  document.getElementById('uploadZone').classList.remove('loaded');
  document.getElementById('uploadTitle').textContent = '上传 theme.md 文件';
  document.getElementById('uploadSub').textContent = '拖拽或点击选择 · 支持 .md / .txt / .json';
  document.getElementById('uploadClear').style.display = 'none';
  document.getElementById('themeFileInput').value = '';
  showToast('已重置为默认主题', 'info');
  if (document.getElementById('render-root').dataset.rendered === '1') renderJSON();
}

   PART 2C — Resizer (drag to resize left panel)
   ════════════════════════════════════════════ */

(function initResizer() {
  const resizer = document.getElementById('resizer');
  const left = document.getElementById('leftPanel');
  let dragging = false, startX = 0, startW = 0;

  resizer.addEventListener('mousedown', (e) => {
    dragging = true; startX = e.clientX; startW = left.offsetWidth;
    resizer.classList.add('dragging');
    document.body.style.cursor = 'col-resize';
    document.body.style.userSelect = 'none';
  });
  document.addEventListener('mousemove', (e) => {
    if (!dragging) return;
    const newW = Math.max(300, Math.min(startW + e.clientX - startX, window.innerWidth * 0.6));
    left.style.width = newW + 'px';
  });
  document.addEventListener('mouseup', () => {
    if (!dragging) return;
    dragging = false;
    resizer.classList.remove('dragging');
    document.body.style.cursor = '';
    document.body.style.userSelect = '';
  });
})();

}

function showToast(msg, type = 'info', duration = 3000) {
  const icons = { success: '✓', error: '✕', info: 'ℹ' };
  const container = document.getElementById('toastContainer');
  const el = document.createElement('div');
  el.className = `toast ${type}`;
  el.textContent = `${icons[type] || ''} ${msg}`;
  container.appendChild(el);
  setTimeout(() => {
    el.classList.add('removing');
    setTimeout(() => el.remove(), 200);
  }, duration);
}

/* ════════════════════════════════════════════
   PART 2H — A2UI Renderer Engine
   ════════════════════════════════════════════ */

/* --- State --- */
let surfaceState = { surfaceId: null, components: {}, dataModel: {}, theme: {} };

/* --- Entry: parse messages & dispatch --- */
function renderJSON() {
  const raw = document.getElementById('json-editor').value.trim();
  const errorBanner = document.getElementById('errorBanner');
  errorBanner.classList.remove('visible');

  if (!raw) { showToast('请先输入 A2UI JSON', 'error'); return; }

  let messages;
  try {
    messages = JSON.parse(raw);
    if (!Array.isArray(messages)) messages = [messages];
  } catch(err) {
    setStatus('error', '解析失败：' + err.message);
    showErrorBanner('JSON 解析错误：' + err.message);
    showToast('JSON 格式错误', 'error');
    return;
  }

  // Reset state
  surfaceState = { surfaceId: null, components: {}, dataModel: {}, theme: {} };

  // Apply uploaded theme tokens as base
  if (Object.keys(currentThemeTokens).length) applyThemeTokens(currentThemeTokens);

  try {
    messages.forEach(msg => dispatchMessage(msg));
    doRender();
    setStatus('ok', `渲染成功 · Surface: ${surfaceState.surfaceId || 'unknown'}`);
    showToast('渲染完成', 'success', 2000);
    document.getElementById('render-root').dataset.rendered = '1';
    document.getElementById('surfaceIdLabel').textContent = surfaceState.surfaceId || '';
  } catch(err) {
    console.error(err);
    setStatus('error', '渲染错误：' + err.message);
    showErrorBanner('渲染错误：\n' + err.message + (err.stack ? '\n\n' + err.stack : ''));
    showToast('渲染失败：' + err.message, 'error', 5000);
  }
}

function dispatchMessage(msg) {
  if (msg.createSurface) {
    const cs = msg.createSurface;
    surfaceState.surfaceId = cs.surfaceId;
    // Apply inline theme overrides from JSON (merge with uploaded theme)
    if (cs.theme && Object.keys(cs.theme).length) {
      Object.entries(cs.theme).forEach(([k, v]) => {
        const cssVar = TOKEN_MAP[k];
        if (cssVar) document.documentElement.style.setProperty(cssVar, v);
      });
    }
  } else if (msg.updateComponents) {
    const uc = msg.updateComponents;
    (uc.components || []).forEach(c => { surfaceState.components[c.id] = c; });
  } else if (msg.updateDataModel) {
    const ud = msg.updateDataModel;
    Object.assign(surfaceState.dataModel, ud.contents || {});
  }
}

function doRender() {
  const root = document.getElementById('render-root');
  // Find root component (id === "root", or first Column/Row, or first component)
  let rootComp = surfaceState.components['root']
    || Object.values(surfaceState.components).find(c => c.component === 'Column' || c.component === 'Row')
    || Object.values(surfaceState.components)[0];
  if (!rootComp) throw new Error('未找到根组件（id="root"）');
  root.innerHTML = '';
  root.appendChild(renderComponent(rootComp, surfaceState.dataModel));
}

/* --- Value resolution (static | data binding) --- */
function resolveValue(val, ctx) {
  if (val === null || val === undefined) return '';
  if (typeof val === 'string' || typeof val === 'number' || typeof val === 'boolean') return val;
  if (typeof val === 'object' && val.path !== undefined) {
    const path = val.path;
    if (path.startsWith('/')) {
      // Absolute path from root dataModel
      const parts = path.slice(1).split('/').filter(Boolean);
      let node = surfaceState.dataModel;
      for (const p of parts) { if (node == null) return ''; node = node[p]; }
      return node ?? '';
    } else {
      // Relative path from context
      return ctx ? (ctx[path] ?? '') : '';
    }
  }
  return '';
}

/* --- Component Renderer --- */
function renderComponent(comp, ctx) {
  if (!comp) return document.createTextNode('');

  switch (comp.component) {

    /* Layout */
    case 'Column': return renderColumn(comp, ctx);
    case 'Row': return renderRow(comp, ctx);
    case 'List': return renderList(comp, ctx);

    /* Display */
    case 'Text': return renderText(comp, ctx);
    case 'Image': return renderImage(comp, ctx);
    case 'Icon': return renderIcon(comp, ctx);
    case 'Video': return renderVideo(comp, ctx);
    case 'AudioPlayer': return renderAudioPlayer(comp, ctx);
    case 'Divider': return renderDivider(comp);

    /* Container */
    case 'Card': return renderCard(comp, ctx);
    case 'Tabs': return renderTabs(comp, ctx);
    case 'Modal': return renderModal(comp, ctx);

    /* Input */
    case 'Button': return renderButton(comp, ctx);
    case 'TextField': return renderTextField(comp, ctx);
    case 'CheckBox': return renderCheckBox(comp, ctx);
    case 'ChoicePicker': return renderChoicePicker(comp, ctx);
    case 'Slider': return renderSlider(comp, ctx);
    case 'DateTimeInput': return renderDateTimeInput(comp, ctx);

    default:
      return renderUnknown(comp);
  }
}

function childById(id) { return surfaceState.components[id]; }

function renderChildren(children, ctx) {
  if (!children) return [];
  if (Array.isArray(children)) return children.map(id => renderComponent(childById(id), ctx)).filter(Boolean);
  // Template: { componentId, path }
  if (children.componentId && children.path) {
    const template = childById(children.componentId);
    const items = resolveValue({ path: children.path }, ctx);
    if (!Array.isArray(items)) return [];
    return items.map(item => renderComponent(template, item));
  }
  return [];
}

/* ── Column ── */
function renderColumn(comp, ctx) {
  const el = document.createElement('div');
  el.style.cssText = `
    display:flex; flex-direction:column;
    justify-content:${flexJustify(comp.justify || 'start')};
    align-items:${flexAlign(comp.align || 'stretch')};
    gap:var(--a2ui-space-sm);
  `;
  if (comp.weight) el.style.flex = comp.weight;
  renderChildren(comp.children, ctx).forEach(c => el.appendChild(c));
  return el;
}

/* ── Row ── */
function renderRow(comp, ctx) {
  const el = document.createElement('div');
  el.style.cssText = `
    display:flex; flex-direction:row;
    justify-content:${flexJustify(comp.justify || 'start')};
    align-items:${flexAlign(comp.align || 'center')};
    gap:var(--a2ui-space-sm); flex-wrap:wrap;
  `;
  if (comp.weight) el.style.flex = comp.weight;
  renderChildren(comp.children, ctx).forEach(c => el.appendChild(c));
  return el;
}

/* ── List ── */
function renderList(comp, ctx) {
  const el = document.createElement('div');
  const horiz = comp.direction === 'horizontal';
  el.style.cssText = `
    display:flex;
    flex-direction:${horiz ? 'row' : 'column'};
    gap:var(--a2ui-space-sm);
    ${horiz ? 'overflow-x:auto;' : ''}
    align-items:${flexAlign(comp.align || 'stretch')};
  `;
  renderChildren(comp.children, ctx).forEach(c => el.appendChild(c));
  return el;
}

/* ── Text ── */
function renderText(comp, ctx) {
  const el = document.createElement('span');
  el.style.display = 'block';
  el.textContent = String(resolveValue(comp.text, ctx) ?? '');
  if (comp.weight) el.style.flex = comp.weight;
  const v = comp.variant || 'body';
  const styles = {
    h1: `font-size:var(--a2ui-font-size-display);font-weight:var(--a2ui-font-weight-bold);color:var(--a2ui-text);line-height:1.3;`,
    h2: `font-size:var(--a2ui-font-size-xxl);font-weight:var(--a2ui-font-weight-bold);color:var(--a2ui-text);line-height:1.35;`,
    h3: `font-size:var(--a2ui-font-size-xl);font-weight:var(--a2ui-font-weight-bold);color:var(--a2ui-text);`,

/* ── Image ── */
function renderImage(comp, ctx) {

    icon: '40px', avatar: '40px', smallFeature: '90px',
    mediumFeature: '150px', largeFeature: '240px', header: '200px',
  };

  img.onerror = () => { wrap.style.background = 'var(--a2ui-border)'; img.style.display = 'none'; };

/* ── Tabs ── */
function renderTabs(comp, ctx) {
  const wrap = document.createElement('div');
  const tabBar = document.createElement('div');
  tabBar.style.cssText = 'display:flex;border-bottom:1px solid var(--a2ui-border);margin-bottom:var(--a2ui-space-md);';
  const panels = document.createElement('div');

  (comp.tabs || []).forEach((tab, i) => {
    const btn = document.createElement('button');
    btn.textContent = tab.title || `Tab ${i+1}`;
    btn.style.cssText = `
      padding:8px 16px;border:none;background:none;cursor:pointer;
      font-size:var(--a2ui-font-size-base);
      font-family:var(--a2ui-font-family);
      color:${i===0?'var(--a2ui-tabs-active)':'var(--a2ui-tabs-inactive)'};
      font-weight:${i===0?'var(--a2ui-font-weight-medium)':'var(--a2ui-font-weight-normal)'};
      border-bottom:${i===0?'2px solid var(--a2ui-tabs-indicator)':'2px solid transparent'};
      margin-bottom:-1px;transition:all 0.15s;
    `;
    const panel = document.createElement('div');
    panel.style.display = i === 0 ? 'block' : 'none';
    const childComp = childById(tab.child);
    if (childComp) panel.appendChild(renderComponent(childComp, ctx));
    panels.appendChild(panel);

    btn.onclick = () => {
      // Update tabs
      tabBar.querySelectorAll('button').forEach((b, j) => {
        b.style.color = j === i ? 'var(--a2ui-tabs-active)' : 'var(--a2ui-tabs-inactive)';
        b.style.borderBottom = j === i ? '2px solid var(--a2ui-tabs-indicator)' : '2px solid transparent';
        b.style.fontWeight = j === i ? 'var(--a2ui-font-weight-medium)' : 'var(--a2ui-font-weight-normal)';
      });
      panels.querySelectorAll('div').forEach((p, j) => { p.style.display = j === i ? 'block' : 'none'; });
    };
    tabBar.appendChild(btn);
  });

  wrap.appendChild(tabBar);
  wrap.appendChild(panels);
  return wrap;
}

/* ── Modal ── */
function renderModal(comp, ctx) {
  // Render trigger button normally, but attach modal behavior
  const triggerComp = childById(comp.trigger);
  const triggerEl = triggerComp ? renderComponent(triggerComp, ctx) : document.createElement('button');

  // Build overlay lazily
  let overlay = null;
  const getOverlay = () => {
    if (overlay) return overlay;
    overlay = document.createElement('div');
    overlay.style.cssText = `
      position:fixed;inset:0;background:var(--a2ui-overlay-bg);
      z-index:1000;display:flex;align-items:center;justify-content:center;
    `;
    const modal = document.createElement('div');
    modal.style.cssText = `
      background:var(--a2ui-surface);border-radius:var(--a2ui-radius-lg);
      padding:var(--a2ui-space-xl);box-shadow:var(--a2ui-shadow-md);
      max-width:520px;width:90%;max-height:80vh;overflow:auto;
    `;
    const contentComp = childById(comp.content);
    if (contentComp) modal.appendChild(renderComponent(contentComp, ctx));
    overlay.appendChild(modal);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) overlay.remove(); });
    return overlay;
  };

  const openModal = (e) => {
    e.preventDefault(); e.stopPropagation();
    document.body.appendChild(getOverlay());
  };

  // Intercept click on trigger
  triggerEl.addEventListener('click', openModal);
  return triggerEl;
}

/* ── Button ── */
function renderButton(comp, ctx) {
  const btn = document.createElement('button');
  const v = comp.variant || 'default';
  const base = `
    display:inline-flex;align-items:center;justify-content:center;gap:4px;
    padding:var(--a2ui-btn-padding-v) var(--a2ui-btn-padding-h);
    border-radius:var(--a2ui-radius-sm);
    font-size:var(--a2ui-font-size-base);
    font-family:var(--a2ui-font-family);
    font-weight:var(--a2ui-font-weight-medium);
    cursor:pointer;border:1px solid transparent;
    transition:all 0.15s;line-height:1.5;
  `;
  const variants = {
    primary: `background:var(--a2ui-primary);color:var(--a2ui-primary-text);border-color:var(--a2ui-primary);`,
    default: `background:var(--a2ui-btn-default-bg);color:var(--a2ui-btn-default-text);border-color:var(--a2ui-btn-default-border);`,
    borderless: `background:transparent;color:var(--a2ui-primary);border-color:transparent;`,
  };
  btn.style.cssText = base + (variants[v] || variants.default);
  const childComp = childById(comp.child);
  if (childComp) btn.appendChild(renderComponent(childComp, ctx));

  // Hover
  btn.onmouseenter = () => {
    if (v === 'primary') btn.style.background = 'var(--a2ui-primary-hover)';
    else if (v === 'default') btn.style.background = '#f5f5f5';
    else btn.style.textDecoration = 'underline';
  };
  btn.onmouseleave = () => {
    if (v === 'primary') btn.style.background = 'var(--a2ui-primary)';
    else if (v === 'default') btn.style.background = 'var(--a2ui-btn-default-bg)';
    else btn.style.textDecoration = 'none';
  };

  // Action
  if (comp.action) {
    btn.onclick = () => {
      if (comp.action.event) showToast(`事件触发：${comp.action.event.name}`, 'info', 2000);
      else if (comp.action.call === 'openUrl') window.open(comp.action.args?.url, '_blank');
    };
  }
  return btn;
}

/* ── TextField ── */
function renderTextField(comp, ctx) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
  if (comp.label) {
    const lbl = document.createElement('label');
    lbl.textContent = comp.label;
    lbl.style.cssText = 'font-size:var(--a2ui-font-size-sm);font-weight:var(--a2ui-font-weight-medium);color:var(--a2ui-text-secondary);';
    wrap.appendChild(lbl);
  }
  const v = comp.variant || 'shortText';
  let input;
  if (v === 'longText') {
    input = document.createElement('textarea');
    input.rows = 3;
    input.style.resize = 'vertical';
  } else {
    input = document.createElement('input');
    input.type = v === 'obscured' ? 'password' : v === 'number' ? 'number' : 'text';
  }
  const initVal = resolveValue(comp.value, ctx);
  input.value = initVal != null ? String(initVal) : '';
  input.style.cssText = `
    padding:6px 10px;
    border:1px solid var(--a2ui-input-border);
    border-radius:var(--a2ui-radius-sm);
    font-size:var(--a2ui-font-size-base);
    font-family:var(--a2ui-font-family);
    background:var(--a2ui-input-bg);
    color:var(--a2ui-text);
    outline:none;
    transition:border-color 0.15s;
    ${v !== 'longText' ? 'height:var(--a2ui-input-height);' : ''}
  `;
  input.onfocus = () => { input.style.borderColor = 'var(--a2ui-input-focus-border)'; };
  input.onblur = () => { input.style.borderColor = 'var(--a2ui-input-border)'; };
  wrap.appendChild(input);
  return wrap;
}

/* ── CheckBox ── */
function renderCheckBox(comp, ctx) {
  const wrap = document.createElement('label');

  const cb = document.createElement('input');
  cb.type = 'checkbox';
  const val = resolveValue(comp.value, ctx);
  cb.checked = Boolean(val);
  cb.style.cssText = 'width:16px;height:16px;accent-color:var(--a2ui-primary);cursor:pointer;';
  const lbl = document.createElement('span');
  lbl.textContent = comp.label || '';
  lbl.style.cssText = 'font-size:var(--a2ui-font-size-base);color:var(--a2ui-text);';
  wrap.appendChild(cb); wrap.appendChild(lbl);
  return wrap;
}

/* ── ChoicePicker ── */
function renderChoicePicker(comp, ctx) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
  if (comp.label) {
    const lbl = document.createElement('div');
    lbl.textContent = comp.label;
    lbl.style.cssText = 'font-size:var(--a2ui-font-size-sm);font-weight:var(--a2ui-font-weight-medium);color:var(--a2ui-text-secondary);';
    wrap.appendChild(lbl);
  }

  const isChips = comp.displayStyle === 'chips';
  const isMulti = comp.variant === 'multipleSelection';
  const currentVal = resolveValue(comp.value, ctx);
  let selected = isMulti
    ? (Array.isArray(currentVal) ? currentVal : [])
    : (currentVal != null ? [currentVal] : []);

  const optionsWrap = document.createElement('div');
  optionsWrap.style.cssText = `display:flex;flex-wrap:wrap;gap:${isChips?'6px':'4px'};`;

  (comp.options || []).forEach(opt => {
    const isSelected = selected.includes(opt.value);
    const el = document.createElement(isChips ? 'button' : 'label');

    if (isChips) {
      el.textContent = opt.label;
      el.style.cssText = `
        padding:4px 12px;border-radius:var(--a2ui-radius-full);cursor:pointer;
        font-size:var(--a2ui-font-size-sm);font-family:var(--a2ui-font-family);
        border:1px solid ${isSelected?'var(--a2ui-primary)':'var(--a2ui-border)'};
        background:${isSelected?'var(--a2ui-primary)':'transparent'};
        color:${isSelected?'var(--a2ui-primary-text)':'var(--a2ui-text)'};
        transition:all 0.15s;
      `;
      el.onclick = () => {
        if (isMulti) {
          const idx = selected.indexOf(opt.value);
          if (idx >= 0) selected.splice(idx, 1); else selected.push(opt.value);
        } else { selected = [opt.value]; }
        // Refresh all chips
        optionsWrap.querySelectorAll('button').forEach((b, i) => {
          const o = (comp.options||[])[i];
          const sel = selected.includes(o?.value);
          b.style.background = sel ? 'var(--a2ui-primary)' : 'transparent';
          b.style.color = sel ? 'var(--a2ui-primary-text)' : 'var(--a2ui-text)';
          b.style.borderColor = sel ? 'var(--a2ui-primary)' : 'var(--a2ui-border)';
        });
      };
    } else {
      el.style.cssText = 'display:flex;align-items:center;gap:6px;cursor:pointer;';
      const inp = document.createElement('input');
      inp.type = isMulti ? 'checkbox' : 'radio';
      inp.name = comp.id || Math.random().toString(36);
      inp.value = opt.value;
      inp.checked = isSelected;
      inp.style.cssText = 'width:15px;height:15px;accent-color:var(--a2ui-primary);cursor:pointer;';
      const span = document.createElement('span');
      span.textContent = opt.label;
      span.style.cssText = 'font-size:var(--a2ui-font-size-base);color:var(--a2ui-text);';
      el.appendChild(inp); el.appendChild(span);
    }
    optionsWrap.appendChild(el);
  });

  wrap.appendChild(optionsWrap);
  return wrap;
}

/* ── Slider ── */
function renderSlider(comp, ctx) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:6px;';
  const val = resolveValue(comp.value, ctx);
  const current = Number(val) || comp.min || 0;
  const max = comp.max || 100;
  const min = comp.min || 0;

  if (comp.label) {
    const row = document.createElement('div');
    row.style.cssText = 'display:flex;justify-content:space-between;align-items:center;';
    const lbl = document.createElement('span');
    lbl.textContent = comp.label;
    lbl.style.cssText = 'font-size:var(--a2ui-font-size-sm);font-weight:var(--a2ui-font-weight-medium);color:var(--a2ui-text-secondary);';
    const valLabel = document.createElement('span');
    valLabel.textContent = current;
    valLabel.style.cssText = 'font-size:var(--a2ui-font-size-sm);color:var(--a2ui-primary);font-weight:var(--a2ui-font-weight-medium);';
    row.appendChild(lbl); row.appendChild(valLabel);
    wrap.appendChild(row);
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = min; slider.max = max; slider.value = current;
    slider.style.cssText = 'width:100%;accent-color:var(--a2ui-primary);cursor:pointer;';
    slider.oninput = () => { valLabel.textContent = slider.value; };
    wrap.appendChild(slider);
  } else {
    const slider = document.createElement('input');
    slider.type = 'range';
    slider.min = min; slider.max = max; slider.value = current;
    slider.style.cssText = 'width:100%;accent-color:var(--a2ui-primary);cursor:pointer;';
    wrap.appendChild(slider);
  }
  return wrap;
}

/* ── DateTimeInput ── */
function renderDateTimeInput(comp, ctx) {
  const wrap = document.createElement('div');
  wrap.style.cssText = 'display:flex;flex-direction:column;gap:4px;';
  if (comp.label) {
    const lbl = document.createElement('label');
    lbl.textContent = comp.label;
    lbl.style.cssText = 'font-size:var(--a2ui-font-size-sm);font-weight:var(--a2ui-font-weight-medium);color:var(--a2ui-text-secondary);';
    wrap.appendChild(lbl);
  }
  const input = document.createElement('input');
  const enableDate = comp.enableDate !== false;
  const enableTime = comp.enableTime === true;
  input.type = enableDate && enableTime ? 'datetime-local' : enableDate ? 'date' : 'time';
  const val = resolveValue(comp.value, ctx);
  input.value = val ? String(val).replace(' ','T') : '';
  if (comp.min) input.min = comp.min;
  if (comp.max) input.max = comp.max;
  input.style.cssText = `
    padding:6px 10px;height:var(--a2ui-input-height);
    border:1px solid var(--a2ui-input-border);
    border-radius:var(--a2ui-radius-sm);
    font-size:var(--a2ui-font-size-base);
    font-family:var(--a2ui-font-family);
    background:var(--a2ui-input-bg);color:var(--a2ui-text);outline:none;
    transition:border-color 0.15s;
  `;
  input.onfocus = () => { input.style.borderColor = 'var(--a2ui-input-focus-border)'; };
  input.onblur = () => { input.style.borderColor = 'var(--a2ui-input-border)'; };
  wrap.appendChild(input);
  return wrap;
}

/* ── Unknown component fallback ── */
function renderUnknown(comp) {
  const el = document.createElement('div');
  el.style.cssText = `
    padding:8px 12px;background:rgba(217,119,6,0.08);border:1px dashed rgba(217,119,6,0.4);
    border-radius:6px;font-size:11px;color:#d97706;font-family:monospace;
  `;
  el.textContent = `⚠ Unknown component: "${comp.component}" (id: ${comp.id})`;
  return el;
}

/* ── Error Banner ── */
function showErrorBanner(msg) {
  const el = document.getElementById('errorBanner');
  el.textContent = msg;
  el.classList.add('visible');
}

/* ── Flex helpers ── */
function flexJustify(v) {
  return { start:'flex-start', center:'center', end:'flex-end',
    spaceBetween:'space-between', spaceAround:'space-around',
    spaceEvenly:'space-evenly', stretch:'stretch' }[v] || 'flex-start';
}
function flexAlign(v) {
  return { start:'flex-start', center:'center', end:'flex-end', stretch:'stretch' }[v] || 'stretch';
}

/* ── Keyboard shortcut: Ctrl+Enter to render ── */
document.getElementById('json-editor').addEventListener('keydown', e => {
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') renderJSON();
});

/* ── Textarea tab key support ── */
document.getElementById('json-editor').addEventListener('keydown', e => {
  if (e.key === 'Tab') {
    e.preventDefault();
    const ta = e.target;
    const start = ta.selectionStart, end = ta.selectionEnd;
    ta.value = ta.value.substring(0, start) + '  ' + ta.value.substring(end);
    ta.selectionStart = ta.selectionEnd = start + 2;
  }
});
</script>
